<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>柒樂部 | 前往目的地</title>
    <link rel="preconnect" href="https://script.google.com">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #FFFDF9; font-family: 'Noto Serif TC', serif; }
        .fade-in { animation: fadeIn 0.6s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-gradient-sweep { animation: gradientSweep 2s linear infinite; }
        @keyframes gradientSweep { 0% { background-position: 200% center; } 100% { background-position: -200% center; } }
        .animate-pulse-soft { animation: pulseSoft 2s ease-in-out infinite; }
        @keyframes pulseSoft { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 1; } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center">

    <!-- 導轉中 UI -->
    <div id="redirectUI" class="text-center fade-in w-full max-w-xs px-6 hidden">
        <div class="flex justify-center mb-8">
            <div class="relative w-20 h-20 bg-[#FFFDF9] rounded-full flex items-center justify-center shadow-[0_4px_20px_rgba(92,84,84,0.06)] border border-[#EBE6E0]">
                <div class="absolute inset-0 rounded-full border-4 border-transparent border-t-[#A69F98] border-r-[#EAE3D9] animate-spin" style="animation-duration: 1.8s;"></div>
                <svg class="w-8 h-8 text-[#8C857E] animate-pulse-soft ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
            </div>
        </div>
        <h2 class="text-xl font-black tracking-widest text-[#5C5454] mb-3">前往目的地</h2>
        <div class="w-full bg-[#F0EAE1]/50 rounded-full h-1.5 mb-5 overflow-hidden">
            <div class="h-full w-full rounded-full bg-gradient-to-r from-[#BDE0FE] via-[#FFC2D1] to-[#E2CBF7] animate-gradient-sweep" style="background-size: 200% auto;"></div>
        </div>
        <p id="loadingText" class="text-xs text-[#A69F98] font-bold tracking-[0.2em]">正在讀取專屬通行證...</p>
    </div>

    <script>
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbzux6h7rNY0MyzcGm3gCLs_m9Zw7JgYisjynJRufPDwsTMlnERizBzEw8WmyplLUeQKjQ/exec";
        const HOME_URL = "https://a7club.github.io/";

        window.onload = async () => {
            let id = null;
            const searchStr = window.location.search.substring(1);
            
            // 解析問號後的參數 (?tag)
            if (searchStr) {
                if (!searchStr.includes('=')) { id = decodeURIComponent(searchStr); }
                else { id = new URLSearchParams(window.location.search).get('id'); }
            } 
            
            // 解析乾淨網址 (/tag) -> 需搭配 404.html 才有作用
            const pathSegments = window.location.pathname.split('/').filter(p => p);
            const lastSegment = pathSegments.length > 0 ? pathSegments[pathSegments.length - 1] : null;
            if (!id && lastSegment && !lastSegment.includes('.html') && lastSegment !== 'u') {
                id = decodeURIComponent(lastSegment);
            }

            // 判斷邏輯：有 ID 則導轉，沒有 ID (首頁) 則回官網
            if (id) {
                document.getElementById('redirectUI').classList.remove('hidden');
                document.getElementById('redirectUI').classList.add('block');
                
                try {
                    const response = await fetch(`${GAS_API_URL}?id=${id}`);
                    const result = await response.json();
                    
                    if (result.status === "success" && result.url) {
                        window.location.replace(result.url);
                    } else {
                        show404();
                    }
                } catch (e) {
                    show404();
                }
            } else {
                // 直接跳轉到 a7club 主網頁
                window.location.replace(HOME_URL);
            }
        };

        function show404() {
            document.body.innerHTML = `
                <div class="text-center fade-in">
                    <span class="text-7xl mb-6 opacity-80 inline-block" style="filter: drop-shadow(0 10px 10px rgba(226, 203, 247, 0.4));">🌧️</span>
                    <h1 class="text-5xl font-black text-[#E2CBF7] mb-3">404</h1>
                    <p class="text-[#5C5454] mb-8 font-bold bg-white px-6 py-2 rounded-lg shadow-sm border border-[#F0EAE1]">這頁雜誌被撕掉了 🫧</p>
                    <a href="${HOME_URL}" class="bg-[#5C5454] text-white px-8 py-3 rounded-xl font-bold tracking-widest hover:bg-[#FFC2D1] transition-colors shadow-md">返回首頁</a>
                </div>`;
        }
    </script>
</body>
</html>
